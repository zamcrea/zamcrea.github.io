<script>
    const PROJECT_ID = "6a608a69001dcb3466fc";
    const ENDPOINT = "https://appwrite.io";

    function inviaDatiAppwrite(azione) {
        const nickname = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        const successoDiv = document.getElementById('successo');

        erroreDiv.style.display = "none";
        successoDiv.style.display = "none";

        if (!email || !password) {
            erroreDiv.innerText = "Inserisci email e password!";
            erroreDiv.style.color = "#dc3545";
            erroreDiv.style.display = "block";
            return;
        }

        erroreDiv.innerText = "Invio dati al server...";
        erroreDiv.style.color = "#666";
        erroreDiv.style.display = "block";

        if (azione === 'registrati') {
            if (!nickname) {
                erroreDiv.innerText = "Scegli un Nickname per registrarti!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }
            if (password.length < 8) {
                erroreDiv.innerText = "La password deve avere almeno 8 caratteri!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }

            fetch(ENDPOINT + "/account", {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json", "X-Appwrite-Project": PROJECT_ID },
                body: JSON.stringify({ userId: "unique()", email: email, password: password, name: nickname })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code && data.code >= 400) {
                    erroreDiv.style.color = "#dc3545";
                    erroreDiv.innerText = "Errore: " + data.message;
                } else {
                    // Salva il nome inserito temporaneamente prima di loggare
                    localStorage.setItem("utenteNickname", nickname);
                    eseguiSessioneLogin(email, password, erroreDiv, successoDiv);
                }
            })
            .catch(() => {
                erroreDiv.style.color = "#dc3545";
                erroreDiv.innerText = "Il server non risponde..fail.";
            });

        } else if (azione === 'accedi') {
            eseguiSessioneLogin(email, password, erroreDiv, successoDiv);
        }
    }

    function eseguiSessioneLogin(email, password, erroreDiv, successoDiv) {
        fetch(ENDPOINT + "/account/sessions/email", {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json", "X-Appwrite-Project": PROJECT_ID },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code && data.code >= 400) {
                erroreDiv.style.color = "#dc3545";
                erroreDiv.innerText = "Dati errati o utente non trovato.";
            } else {
                // Se entriamo via Login classico, prendiamo il nome registrato nel server cloud
                localStorage.setItem("utenteLoggato", "true");
                
                // Se non abbiamo ancora salvato il nome locale, usa la mail come nome di riserva
                const nomeDaSalvare = data.userName || email.split('@')[0];
                localStorage.setItem("utenteNickname", nomeDaSalvare);
                
                erroreDiv.style.display = "none";
                successoDiv.innerText = " Accesso confermato! Entrando...";
                successoDiv.style.display = "block";
                
                setTimeout(function() {
                    window.location.replace("index.html?v=" + Date.now());
                }, 1200);
            }
        })
        .catch(() => {
            erroreDiv.style.color = "#dc3545";
            erroreDiv.innerText = "Errore di rete durante il login.";
        });
    }
</script>
