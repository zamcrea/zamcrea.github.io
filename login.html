<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScuolaVVeloce - Accedi</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 35px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 340px; text-align: center; }
        h2 { color: #007bff; margin-top: 0; margin-bottom: 5px; }
        p { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .btn-accedi { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-registrati { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .error-msg { color: #dc3545; font-size: 0.9em; margin-top: 12px; display: none; font-weight: bold; }
        .success-msg { color: #28a745; font-size: 1.05em; margin-top: 12px; display: none; font-weight: bold; }
        .divisore { margin: 15px 0; color: #aaa; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 ScuolaVVeloce</h2>
    <p>Usa la tua email personale per continuare</p>
    
    <input type="text" id="nickname" placeholder="Nickname (solo per registrazione)">
    <input type="email" id="email" placeholder="Inserisci la tua Email">
    <input type="password" id="password" placeholder="Inserisci la Password">
    
    <button type="button" class="btn-accedi" onclick="inviaDatiAppwrite('accedi')">Accedi</button>
    <div class="divisore">OPPURE SE SEI NUOVO</div>
    <button type="button" class="btn-registrati" onclick="inviaDatiAppwrite('registrati')">Registrati Gratis</button>
    
    <div id="errore" class="error-msg"></div>
    <div id="successo" class="success-msg"></div>
</div>

<script>
    const PROJECT_ID = "6a608a69001dcb3466fc";
    const ENDPOINT = "https://fra.cloud.appwrite.io/v1";

    function inviaDatiAppwrite(azione) {
        const nickname = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        const successoDiv = document.getElementById('successo');

        erroreDiv.style.display = "none";
        successoDiv.style.display = "none";

        if (!email || !password) {
            erroreDiv.innerText = "Inserisci email e password!";
            erroreDiv.style.color = "#dc3545";
            erroreDiv.style.display = "block";
            return;
        }

        erroreDiv.innerText = "Invio dati sicuri ad Appwrite Cloud...";
        erroreDiv.style.color = "#666";
        erroreDiv.style.display = "block";

        if (azione === 'registrati') {
            if (!nickname) {
                erroreDiv.innerText = "Scegli un Nickname per registrarti!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }
            if (password.length < 8) {
                erroreDiv.innerText = "La password deve avere almeno 8 caratteri!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }

            // AGGIUNTA MODALITÀ CORS PER SBLOCCARE I SERVER DI FRANCOFORTE
            fetch(ENDPOINT + "/account", {
                method: "POST",
                mode: "cors", // <--- FORZA LO SBLOCCO RETE 
                headers: {
                    "Content-Type": "application/json",
                    "X-Appwrite-Project": PROJECT_ID
                },
                body: JSON.stringify({
                    userId: "unique()",
                    email: email,
                    password: password,
                    name: nickname
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code && data.code >= 400) {
                    erroreDiv.style.color = "#dc3545";
                    erroreDiv.innerText = "Errore: " + data.message;
                } else {
                    eseguiSessioneLogin(email, password, erroreDiv, successoDiv);
                }
            })
            .catch(() => {
                erroreDiv.style.color = "#dc3545";
                erroreDiv.innerText = "Il server non risponde alla registrazione.";
            });

        } else if (azione === 'accedi') {
            eseguiSessioneLogin(email, password, erroreDiv, successoDiv);
        }
    }

    function eseguiSessioneLogin(email, password, erroreDiv, successoDiv) {
        // AGGIUNTA MODALITÀ CORS ANCHE SULL'ACCESSO
        fetch(ENDPOINT + "/account/sessions/email", {
            method: "POST",
            mode: "cors", // <--- FORZA LO SBLOCCO RETE 
            headers: {
                "Content-Type": "application/json",
                "X-Appwrite-Project": PROJECT_ID
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code && data.code >= 400) {
                erroreDiv.style.color = "#dc3545";
                erroreDiv.innerText = "Dati errati o utente non trovato.";
            } else {
                localStorage.setItem("utenteLoggato", "true");
                erroreDiv.style.display = "none";
                
                successoDiv.innerText = "🔓 Accesso confermato! Entrando...";
                successoDiv.style.display = "block";
                
                setTimeout(function() {
                    window.location.replace("index.html?v=" + Date.now());
                }, 1200);
            }
        })
        .catch(() => {
            erroreDiv.style.color = "#dc3545";
            erroreDiv.innerText = "Errore di rete durante il login.";
        });
    }
</script>

</body>
</html>
