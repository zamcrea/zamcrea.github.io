<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScuolaVVeloce - Accedi</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 35px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 340px; text-align: center; }
        h2 { color: #007bff; margin-top: 0; margin-bottom: 5px; }
        p { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        
        .btn-accedi { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-accedi:hover { background: #0056b3; }
        
        .btn-registrati { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-registrati:hover { background: #218838; }
        
        .error-msg { color: #dc3545; font-size: 0.9em; margin-top: 12px; display: none; font-weight: bold; }
        .success-msg { color: #28a745; font-size: 1.05em; margin-top: 12px; display: none; font-weight: bold; }
        .divisore { margin: 15px 0; color: #aaa; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 ScuolaVVeloce</h2>
    <p>Usa la tua email personale per continuare</p>
    
    <!-- Modulo con input classici -->
    <input type="text" id="nickname" placeholder="Scegli un Nickname (solo per registrazione)">
    <input type="email" id="email" placeholder="Inserisci la tua Email">
    <input type="password" id="password" placeholder="Inserisci la Password">
    
    <button type="button" class="btn-accedi" onclick="gestisciAppwrite('accedi')">Accedi</button>
    
    <div class="divisore">OPPURE SE SEI NUOVO</div>
    
    <button type="button" class="btn-registrati" onclick="gestisciAppwrite('registrati')">Registrati Gratis</button>
    
    <div id="errore" class="error-msg"></div>
    <div id="successo" class="success-msg"></div>
</div>

<!-- LIBRERIA WEB UFFICIALE DI APPWRITE (SENZA MODULI NÉ BLOCCHI) -->
<script src="https://jsdelivr.net"></script>

<script>
    // Inizializzazione del server con i vostri dati esatti di ScuolaVVeloce
    const client = new Appwrite.Client();
    client
        .setEndpoint('https://fra.cloud.appwrite.io/v1') // Il vostro endpoint
        .setProject('6a608a69001dcb3466fc');            // Il vostro Project ID

    const account = new Appwrite.Account(client);

    function gestisciAppwrite(azione) {
        const nickname = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        const successoDiv = document.getElementById('successo');

        erroreDiv.style.display = "none";
        successoDiv.style.display = "none";

        if (!email || !password) {
            erroreDiv.innerText = "Inserisci email e password!";
            erroreDiv.style.display = "block";
            return;
        }

        erroreDiv.innerText = "Comunicazione con Appwrite Cloud...";
        erroreDiv.style.color = "#666";
        erroreDiv.style.display = "block";

        if (azione === 'registrati') {
            if (!nickname) {
                erroreDiv.innerText = "Per registrarti devi scegliere un Nickname!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }
            if (password.length < 8) {
                erroreDiv.innerText = "La password di Appwrite deve essere di almeno 8 caratteri!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }

            // CREAZIONE UTENTE AUTOMATICA SU APPWRITE ('unique()' genera l'ID utente da solo)
            account.create('unique()', email, password, nickname)
                .then(() => {
                    // Dopo la registrazione, esegui subito l'accesso automatico
                    return account.createEmailPasswordSession(email, password);
                })
                .then(() => {
                    localStorage.setItem("utenteLoggato", "true");
                    erroreDiv.style.display = "none";
                    successoDiv.innerText = "🎉 Account creato! Benvenuto su ScuolaVVeloce...";
                    successoDiv.style.display = "block";
                    setTimeout(() => { window.location.replace("index.html"); }, 1500);
                })
                .catch(error => {
                    erroreDiv.style.color = "#dc3545";
                    erroreDiv.innerText = "Errore registrazione: " + error.message;
                });

        } else if (azione === 'accedi') {
            // LOGIN SU APPWRITE VIA EMAIL E PASSWORD
            account.createEmailPasswordSession(email, password)
                .then(() => {
                    localStorage.setItem("utenteLoggato", "true");
                    erroreDiv.style.display = "none";
                    successoDiv.innerText = "🔓 Accesso eseguito! Caricamento...";
                    successoDiv.style.display = "block";
                    setTimeout(() => { window.location.replace("index.html"); }, 1500);
                })
                .catch(error => {
                    erroreDiv.style.color = "#dc3545";
                    erroreDiv.innerText = "Dati errati o utente inesistente.";
                });
        }
    }
</script>

</body>
</html>
