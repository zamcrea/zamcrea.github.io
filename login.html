<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Reindirizzamento</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background: #f0f2f5; }
        .box { background: white; padding: 40px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 15px 30px; font-size: 1.2em; font-weight: bold; color: white; background: #28a745; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔗 Test Salto Pagina</h2>
    <p>Clicca il pulsante verde qui sotto.</p>
    
    <!-- Questo comando dice al browser di cambiare subito indirizzo senza chiedere permessi -->
    <button onclick="window.location.href = 'https://google.com';">Vai a Google.com</button>
</div>

</body>
</html>
