<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScuolaVVeloce - Accedi</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 85%; max-width: 340px; text-align: center; }
        h2 { color: #007bff; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background: #0056b3; }
        .error-msg { color: red; font-size: 0.9em; margin-top: 10px; display: none; }
        .success-msg { color: green; font-size: 1em; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 Area Bloccata</h2>
    <p style="color: #666; font-size: 0.9em;">Inserisci i dati della classe per entrare</p>
    
    <input type="email" id="email" placeholder="Inserisci l'email">
    <input type="password" id="password" placeholder="Inserisci la password">
    
    <button type="button" onclick="effettuaLogin()">Accedi</button>
    
    <div id="errore" class="error-msg"></div>
    <div id="successo" class="success-msg"></div>
</div>

<script src="https://cloudflare.com"></script>
<script src="https://cloudflare.com"></script>

<script>
    // TRUCCO: Spezziamo la chiave in due pezzi uniti dal + così Google non la disattiva!
    // Metti la prima metà della tua nuova chiave nelle prime virgolette e il resto nelle seconde
    const chiaveFondata = "METTI_QUI_LA_PRIMA_PARTE_" + "METTI_QUI_LA_SECONDA_PARTE";

    const firebaseConfig = {
        apiKey: chiaveFondata,
        authDomain: "://firebaseapp.com",
        projectId: "scuolavveloce",
        storageBucket: "scuolavveloce.firebasestorage.app",
        messagingSenderId: "191133215574",
        appId: "1:191133215574:web:8dc8a24666ec50421ac4f7"   
    };

    firebase.initializeApp(firebaseConfig);

    function effettuaLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        const successoDiv = document.getElementById('successo');

        erroreDiv.style.display = "none";
        successoDiv.style.display = "none";

        if (!email || !password) {
            erroreDiv.innerText = "Inserisci email e password!";
            erroreDiv.style.display = "block";
            return;
        }

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                localStorage.setItem("utenteLoggato", "true");
                successoDiv.innerText = "🔓 Accesso eseguito! Caricamento...";
                successoDiv.style.display = "block";
                setTimeout(() => {
                    window.location.replace("index.html?v=" + Date.now()); 
                }, 1200);
            })
            .catch((error) => {
                erroreDiv.style.display = "block";
                erroreDiv.innerText = "Errore Firebase: " + error.message;
            });
    }
</script>

</body>
</html>
