<script src="https://jsdelivr.net"></script>

<script>
    const client = new Appwrite.Client();
    client
        .setEndpoint('https://appwrite.io') 
        .setProject('6a608a69001dcb3466fc');            

    const account = new Appwrite.Account(client);

    function gestisciAppwrite(azione) {
        const nickname = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        const successoDiv = document.getElementById('successo');

        erroreDiv.style.display = "none";
        successoDiv.style.display = "none";

        if (!email || !password) {
            erroreDiv.innerText = "Inserisci email e password!";
            erroreDiv.style.color = "#dc3545";
            erroreDiv.style.display = "block";
            return;
        }

        erroreDiv.innerText = "Comunicazione con Appwrite Cloud...";
        erroreDiv.style.color = "#666";
        erroreDiv.style.display = "block";

        if (azione === 'registrati') {
            if (!nickname) {
                erroreDiv.innerText = "Scegli un Nickname per registrarti!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }
            if (password.length < 8) {
                erroreDiv.innerText = "La password deve avere almeno 8 caratteri!";
                erroreDiv.style.color = "#dc3545";
                erroreDiv.style.display = "block";
                return;
            }

            account.create('unique()', email, password, nickname)
                .then(() => {
                    return account.createEmailPasswordSession(email, password);
                })
                .then(() => {
                    localStorage.setItem("utenteLoggato", "true");
                    erroreDiv.style.display = "none";
                    successoDiv.innerText = "🎉 Profilo creato! Entrando...";
                    successoDiv.style.display = "block";
                    setTimeout(() => { window.location.replace("index.html"); }, 1200);
                })
                .catch(error => {
                    erroreDiv.style.color = "#dc3545";
                    // Questo mostra l'errore reale inviato da Appwrite
                    erroreDiv.innerText = "Errore: " + error.message; 
                });

        } else if (azione === 'accedi') {
            account.createEmailPasswordSession(email, password)
                .then(() => {
                    localStorage.setItem("utenteLoggato", "true");
                    erroreDiv.style.display = "none";
                    successoDiv.innerText = "🔓 Accesso eseguito! Caricamento...";
                    successoDiv.style.display = "block";
                    setTimeout(() => { window.location.replace("index.html"); }, 1200);
                })
                .catch(error => {
                    erroreDiv.style.color = "#dc3545";
                    // Mostra se la password è errata o se il dominio è bloccato
                    erroreDiv.innerText = "Errore Accesso: " + error.message;
                });
        }
    }
</script>
